<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensei Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #111; color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  h1 { color: #f90; margin-bottom: 20px; font-size: 1.2rem; letter-spacing: 2px; }

  /* Login */
  #login-screen { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 80px; }
  #login-screen input { background: #222; border: 1px solid #444; color: #eee; padding: 10px 16px; font-size: 1rem; font-family: monospace; border-radius: 4px; width: 240px; text-align: center; }
  #login-screen button { background: #f90; color: #000; border: none; padding: 10px 24px; font-family: monospace; font-weight: bold; cursor: pointer; border-radius: 4px; width: 240px; }
  #login-error { color: #f55; font-size: 0.85rem; }

  /* Panel */
  #panel { display: none; width: 100%; max-width: 640px; }
  .section { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
  .section h2 { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 4px; margin-top: 10px; }
  label:first-of-type { margin-top: 0; }
  select, input[type="text"], textarea { width: 100%; background: #222; border: 1px solid #444; color: #eee; padding: 8px 10px; font-family: monospace; font-size: 0.9rem; border-radius: 4px; }
  textarea { resize: vertical; min-height: 70px; }
  input[type="range"] { width: 100%; accent-color: #f90; }
  .range-row { display: flex; align-items: center; gap: 10px; }
  .range-row span { color: #f90; font-weight: bold; min-width: 20px; text-align: center; }

  /* Token */
  .token-row { display: flex; gap: 8px; }
  .token-row input { flex: 1; }
  .token-row button { background: #333; color: #eee; border: 1px solid #555; padding: 8px 12px; font-family: monospace; cursor: pointer; border-radius: 4px; white-space: nowrap; }
  .token-row button:hover { background: #444; }

  /* Buttons */
  .btn-save { width: 100%; background: #f90; color: #000; border: none; padding: 12px; font-family: monospace; font-weight: bold; font-size: 1rem; cursor: pointer; border-radius: 4px; margin-top: 4px; }
  .btn-save:hover { background: #ffa820; }
  .btn-save:disabled { background: #555; color: #888; cursor: not-allowed; }
  .btn-logout { background: none; border: none; color: #555; font-family: monospace; font-size: 0.75rem; cursor: pointer; margin-top: 8px; }
  .btn-logout:hover { color: #888; }

  /* Historial */
  #historial-list { list-style: none; }
  #historial-list li { padding: 8px 0; border-bottom: 1px solid #2a2a2a; font-size: 0.8rem; color: #bbb; }
  #historial-list li:last-child { border-bottom: none; }
  #historial-list li .fecha { color: #555; font-size: 0.75rem; }
  #historial-list .empty { color: #555; font-style: italic; }

  /* Toast */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #2a2a2a; border: 1px solid #f90; color: #eee; padding: 10px 20px; border-radius: 6px; font-size: 0.85rem; font-family: monospace; opacity: 0; transition: all 0.3s ease; z-index: 999; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { border-color: #f55; }

  /* Status */
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot-ok { background: #0f0; }
  .dot-err { background: #f55; }
  #repo-info { font-size: 0.75rem; color: #555; margin-top: 6px; }
</style>
</head>
<body>

<h1>⚙ SENSEI ADMIN</h1>

<!-- Login -->
<div id="login-screen">
  <input type="password" id="pwd-input" placeholder="contraseña" autocomplete="current-password" />
  <div id="login-error"></div>
  <button onclick="doLogin()">entrar</button>
</div>

<!-- Panel -->
<div id="panel">

  <!-- GitHub Token -->
  <div class="section">
    <h2>GitHub Token</h2>
    <div class="token-row">
      <input type="password" id="gh-token" placeholder="ghp_..." />
      <button onclick="saveToken()">guardar token</button>
      <button onclick="clearToken()">borrar</button>
    </div>
    <div id="repo-info"></div>
  </div>

  <!-- Config -->
  <div class="section">
    <h2>Configuración del mensaje</h2>

    <label>Estilo</label>
    <select id="estilo">
      <option value="auto">🔄 Rotación automática</option>
      <option value="chiste">🎤 Chiste chileno (Álvaro Salas / Charly)</option>
      <option value="sabio">📜 Sabio antiguo (Confucio, Séneca...)</option>
      <option value="graffiti">✏️ Graffiti absurdo</option>
      <option value="action">💪 Anti-action hero (Stallone, Van Damme...)</option>
    </select>

    <label>Intensidad del humor</label>
    <div class="range-row">
      <span>1</span>
      <input type="range" id="intensidad" min="1" max="5" step="1" value="3" oninput="document.getElementById('int-val').textContent=this.value" />
      <span>5</span>
      <span id="int-val" style="color:#f90;min-width:20px">3</span>
    </div>

    <label>Temas a priorizar esta semana</label>
    <textarea id="temas-prio" placeholder="ej: fútbol, trabajo, tecnología"></textarea>

    <label>Temas a evitar</label>
    <textarea id="temas-evitar" placeholder="ej: política, familia"></textarea>

    <label>Notas libres para el AI</label>
    <textarea id="notas" placeholder="cualquier instrucción extra..."></textarea>
  </div>

  <button class="btn-save" id="btn-save" onclick="saveConfig()">💾 Guardar en GitHub</button>

  <!-- Historial -->
  <div class="section" style="margin-top:16px">
    <h2>Historial (últimos 10)</h2>
    <ul id="historial-list"><li class="empty">cargando...</li></ul>
  </div>

  <div style="text-align:center">
    <button class="btn-logout" onclick="doLogout()">cerrar sesión</button>
  </div>
</div>

<div id="toast"></div>

<script>
const REPO = 'panchucrut/daily-motivation';
const CONFIG_PATH = 'config.json';
const HISTORY_PATH = 'motivation_history.json';
const PASSWORD = 'sensei2024';

// ── Auth ──────────────────────────────────────────────────────────────────
function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === PASSWORD) {
    sessionStorage.setItem('auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    loadToken();
    loadConfig();
    loadHistorial();
  } else {
    document.getElementById('login-error').textContent = 'contraseña incorrecta';
  }
}

function doLogout() {
  sessionStorage.removeItem('auth');
  document.getElementById('panel').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
}

document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Auto-login si ya estaba en sesión
if (sessionStorage.getItem('auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  loadToken();
  loadConfig();
  loadHistorial();
}

// ── Token ─────────────────────────────────────────────────────────────────
function saveToken() {
  const t = document.getElementById('gh-token').value.trim();
  if (!t) { showToast('ingresa un token primero', true); return; }
  localStorage.setItem('gh_token', t);
  showToast('token guardado');
  updateRepoInfo(t);
}

function clearToken() {
  localStorage.removeItem('gh_token');
  document.getElementById('gh-token').value = '';
  document.getElementById('repo-info').innerHTML = '';
  showToast('token borrado');
}

function loadToken() {
  const t = localStorage.getItem('gh_token');
  if (t) {
    document.getElementById('gh-token').value = t;
    updateRepoInfo(t);
  }
}

function getToken() { return localStorage.getItem('gh_token') || document.getElementById('gh-token').value.trim(); }

async function updateRepoInfo(token) {
  const el = document.getElementById('repo-info');
  try {
    const r = await ghGet(`repos/${REPO}`, token);
    el.innerHTML = `<span class="status-dot dot-ok"></span>${REPO} ✓`;
  } catch(e) {
    el.innerHTML = `<span class="status-dot dot-err"></span>error al verificar repo`;
  }
}

// ── GitHub API ────────────────────────────────────────────────────────────
async function ghGet(path, token) {
  const t = token || getToken();
  const r = await fetch(`https://api.github.com/${path}`, {
    headers: { Authorization: `token ${t}`, Accept: 'application/vnd.github+json' }
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function ghGetFile(path) {
  return ghGet(`repos/${REPO}/contents/${path}`);
}

async function ghPutFile(path, content, sha, message) {
  const token = getToken();
  if (!token) throw new Error('sin token');
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(content))), sha })
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || r.status); }
  return r.json();
}

// ── Config ────────────────────────────────────────────────────────────────
async function loadConfig() {
  try {
    const file = await ghGetFile(CONFIG_PATH);
    const cfg = JSON.parse(atob(file.content));
    document.getElementById('estilo').value = cfg.estilo || 'auto';
    document.getElementById('intensidad').value = cfg.intensidad || 3;
    document.getElementById('int-val').textContent = cfg.intensidad || 3;
    document.getElementById('temas-prio').value = (cfg.temas_priorizar || []).join(', ');
    document.getElementById('temas-evitar').value = (cfg.temas_evitar || []).join(', ');
    document.getElementById('notas').value = cfg.notas_libres || '';
  } catch(e) {
    console.warn('No se pudo cargar config.json:', e.message);
  }
}

async function saveConfig() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = 'guardando...';
  try {
    const temasPrio = document.getElementById('temas-prio').value
      .split(',').map(s=>s.trim()).filter(Boolean);
    const temasEvitar = document.getElementById('temas-evitar').value
      .split(',').map(s=>s.trim()).filter(Boolean);

    const cfg = {
      estilo: document.getElementById('estilo').value,
      intensidad: parseInt(document.getElementById('intensidad').value),
      temas_priorizar: temasPrio,
      temas_evitar: temasEvitar,
      notas_libres: document.getElementById('notas').value.trim(),
      actualizado: new Date().toISOString()
    };

    let sha = null;
    try { const f = await ghGetFile(CONFIG_PATH); sha = f.sha; } catch(e) {}

    await ghPutFile(CONFIG_PATH, JSON.stringify(cfg, null, 2), sha, 'update config.json via admin panel');
    showToast('✓ config guardada en GitHub');
  } catch(e) {
    showToast('error: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Guardar en GitHub';
  }
}

// ── Historial ─────────────────────────────────────────────────────────────
async function loadHistorial() {
  const ul = document.getElementById('historial-list');
  try {
    const file = await ghGetFile(HISTORY_PATH);
    const data = JSON.parse(atob(file.content));
    const items = Array.isArray(data) ? data : (data.emails || []);
    const last10 = items.slice(-10).reverse();

    if (!last10.length) { ul.innerHTML = '<li class="empty">sin historial aún</li>'; return; }

    ul.innerHTML = last10.map(e => `
      <li>
        <div class="fecha">${e.fecha ? new Date(e.fecha).toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short'}) : '?'}</div>
        <div>${e.body || e.mensaje || e.content || '(sin texto)'}</div>
      </li>
    `).join('');
  } catch(e) {
    ul.innerHTML = '<li class="empty">no se pudo cargar historial</li>';
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}
</script>
</body>
</html>
